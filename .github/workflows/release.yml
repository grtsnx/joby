name: Create GitHub Release and WordPress Package

on:
  push:
    branches:
      - main

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  release:
    name: Package and Release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Determine Next Version
        id: tag_action
        uses: anothrNick/github-tag-action@1.71.0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          WITH_V: true
          DEFAULT_BUMP: patch
          DRY_RUN: true # We only want to calculate the version here

      - name: Sync Version to Code
        id: sync_code
        run: |
          NEW_TAG="${{ steps.tag_action.outputs.new_tag }}"
          NEW_VERSION="${{ steps.tag_action.outputs.new_version }}"
          
          if [ -z "$NEW_VERSION" ]; then
            echo "Error: Could not determine next version. Using 1.0.0 as fallback."
            NEW_VERSION="1.0.0"
            NEW_TAG="v1.0.0"
          fi
          
          echo "Updating code to version $NEW_VERSION"
          
          # Update Version: in plugin header
          sed -i "s/Version:.*/Version: $NEW_VERSION/" joby-sync.php
          
          # Update JOBY_VERSION constant
          sed -i "s/define('JOBY_VERSION', '.*');/define('JOBY_VERSION', '$NEW_VERSION');/" joby-sync.php
          
          # Check if changes exist
          if git diff --quiet; then
            echo "No version changes needed in code."
            echo "changed=false" >> $GITHUB_OUTPUT
          else
            echo "Version updated in code."
            echo "changed=true" >> $GITHUB_OUTPUT
          fi
          echo "tag=$NEW_TAG" >> $GITHUB_OUTPUT
          echo "version=$NEW_VERSION" >> $GITHUB_OUTPUT

      - name: Commit and Push Version Bump
        if: steps.sync_code.outputs.changed == 'true'
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add joby-sync.php
          git commit -m "chore: bump version to ${{ steps.sync_code.outputs.version }} [skip ci]"
          git push origin main
        env:
          GITHUB_TOKEN: ${{ secrets.RELEASE_TOKEN }}

      - name: Create Git Tag
        if: steps.sync_code.outputs.changed == 'true'
        run: |
          git tag ${{ steps.sync_code.outputs.tag }}
          git push origin ${{ steps.sync_code.outputs.tag }}
        env:
          GITHUB_TOKEN: ${{ secrets.RELEASE_TOKEN }}

      - name: Create Package
        run: |
          STAGING_DIR="joby-sync-staging"
          mkdir -p $STAGING_DIR/joby-sync
          cp -r includes $STAGING_DIR/joby-sync/
          cp -r assets $STAGING_DIR/joby-sync/
          cp joby-sync.php $STAGING_DIR/joby-sync/
          cd $STAGING_DIR
          zip -r ../joby-sync.zip joby-sync/
          cd ..

      - name: Create GitHub Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ steps.sync_code.outputs.tag }}"
          # Use official GitHub CLI (gh) to create the release and upload the asset
          gh release create "$TAG" \
            joby-sync.zip \
            --title "Joby $TAG ($(date +'%Y-%m-%d'))" \
            --generate-notes \
            --latest
