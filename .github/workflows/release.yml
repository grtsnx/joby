name: Create GitHub Release and WordPress Package

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  release:
    name: Package and Release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Create Package Directory
        run: |
          mkdir -p build/joby-sync
          # Copy only essential production files, excluding all development and repository metadata
          rsync -rr . build/joby-sync \
            --exclude '.git*' \
            --exclude '.github' \
            --exclude '.DS_Store' \
            --exclude 'release.sh' \
            --exclude 'build' \
            --exclude 'LICENSE' \
            --exclude 'README.md' \
            --exclude 'CONTRIBUTING.md' \
            --exclude 'SECURITY.md' \
            --exclude 'CODE_OF_CONDUCT.md' \
            --exclude '.gitignore' \
            --exclude 'task.md'

      - name: Zip Plugin
        run: |
          cd build
          zip -r ../joby-sync.zip joby-sync/

      - name: Generate Tag and Release Name
        id: vars
        run: |
          echo "tag=v1.0.${{ github.run_number }}" >> $GITHUB_OUTPUT
          echo "date=$(date +'%Y-%m-%d')" >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ steps.vars.outputs.tag }}
          name: Release ${{ steps.vars.outputs.tag }} (${{ steps.vars.outputs.date }})
          files: joby-sync.zip
          generate_release_notes: true
          body: |
            ## Automated Release
            This release was automatically generated on a merge to the main branch.
            
            ### Installation
            1. Download the `joby-sync.zip` file below.
            2. In your WordPress dashboard, go to **Plugins > Add New > Upload Plugin**.
            3. Choose the downloaded zip file and click **Install Now**.
            4. Activate the plugin.
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
