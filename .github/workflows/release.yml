name: Create GitHub Release and WordPress Package

on:
  push:
    branches:
      - main

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  release:
    name: Package and Release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0 # Fetch all history and tags

      - name: Extract Plugin Version
        id: vars
        run: |
          # Extract the version number from the plugin header
          VERSION=$(grep "Version:" joby-sync.php | awk '{print $NF}')
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "tag=v$VERSION" >> $GITHUB_OUTPUT
          echo "date=$(date +'%Y-%m-%d')" >> $GITHUB_OUTPUT
          echo "Detected Version: $VERSION"

      - name: Check if Tag Exists
        id: check_tag
        run: |
          TAG="v${{ steps.vars.outputs.version }}"
          if git rev-parse "$TAG" >/dev/null 2>&1; then
            echo "exists=true" >> $GITHUB_OUTPUT
            echo "Tag $TAG already exists. Skipping release."
          else
            echo "exists=false" >> $GITHUB_OUTPUT
          fi

      - name: Create Package
        if: steps.check_tag.outputs.exists == 'false'
        run: |
          # 1. Create a clean staging directory outside the build path
          STAGING_DIR="joby-sync-staging"
          mkdir -p $STAGING_DIR/joby-sync
          
          # 2. Copy essential files using a clean list
          cp -r includes $STAGING_DIR/joby-sync/
          cp -r assets $STAGING_DIR/joby-sync/
          cp joby-sync.php $STAGING_DIR/joby-sync/
          
          # 3. Zip from the staging directory to the workspace root
          cd $STAGING_DIR
          zip -r ../joby-sync.zip joby-sync/
          cd ..
          
          # 4. Verify the file exists and has size
          if [ -f "joby-sync.zip" ]; then
            echo "✅ Package created successfully: $(ls -lh joby-sync.zip)"
          else
            echo "❌ Failed to create package!"
            exit 1
          fi

      - name: Verify Workspace Before Release
        if: steps.check_tag.outputs.exists == 'false'
        run: |
          echo "Current Path: $(pwd)"
          ls -lh joby-sync.zip

      - name: Create GitHub Release
        if: steps.check_tag.outputs.exists == 'false'
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ steps.vars.outputs.tag }}
          name: Joby ${{ steps.vars.outputs.tag }} (${{ steps.vars.outputs.date }})
          files: joby-sync.zip
          generate_release_notes: true
          body: |
            ## Automated Release
            This release was automatically generated because the version number in `joby-sync.php` was updated to ${{ steps.vars.outputs.version }}.
            
            ### Installation
            1. Download the `joby-sync.zip` file below.
            2. In your WordPress dashboard, go to **Plugins > Add New > Upload Plugin**.
            3. Choose the downloaded zip file and click **Install Now**.
            4. Activate the plugin.
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
