name: Create GitHub Release and WordPress Package

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    name: Package and Release
    runs-on: ubuntu-latest
    env:
      ACTIONS_ALLOW_USE_UNSECURE_NODE_VERSION: 'true'
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Determine Next Version
        id: tag_action
        uses: anothrNick/github-tag-action@1.71.0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          WITH_V: true
          DEFAULT_BUMP: patch
          DRY_RUN: true

      - name: Sync Version to Code
        id: sync_code
        run: |
          # Prioritize the tag action's output
          NEW_TAG="${{ steps.tag_action.outputs.new_tag }}"
          
          # If tag action produced nothing, fallback to 1.0.0
          if [ -z "$NEW_TAG" ]; then
            NEW_TAG="v1.0.0"
          fi
          
          # Clean version (remove 'v')
          NEW_VERSION=$(echo $NEW_TAG | sed 's/^v//')
          
          echo "Calculated Tag: $NEW_TAG"
          echo "Calculated Version: $NEW_VERSION"

          # DEEP CHECK: Does this tag or release already exist?
          TAG_EXISTS=false
          if git rev-parse "$NEW_TAG" >/dev/null 2>&1; then TAG_EXISTS=true; fi
          
          RELEASE_EXISTS=false
          if gh release view "$NEW_TAG" >/dev/null 2>&1; then RELEASE_EXISTS=true; fi

          if [ "$TAG_EXISTS" = "true" ] || [ "$RELEASE_EXISTS" = "true" ]; then
            echo "Skipping: $NEW_TAG already exists as a tag or release."
            echo "skip=true" >> $GITHUB_OUTPUT
          else
            echo "Proceeding with new release: $NEW_TAG"
            echo "skip=false" >> $GITHUB_OUTPUT
          fi
          
          echo "tag=$NEW_TAG" >> $GITHUB_OUTPUT
          echo "version=$NEW_VERSION" >> $GITHUB_OUTPUT

          # Update the files
          sed -i "s/Version:.*/Version: $NEW_VERSION/" joby-sync.php
          sed -i "s/define('JOBY_VERSION', '.*');/define('JOBY_VERSION', '$NEW_VERSION');/" joby-sync.php

      - name: Commit and Push Version Bump
        if: steps.sync_code.outputs.skip == 'false'
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add joby-sync.php
          git commit -m "chore: bump version to ${{ steps.sync_code.outputs.version }} [skip ci]" || echo "No changes"
          git push origin main || echo "No changes"
        env:
          GITHUB_TOKEN: ${{ secrets.RELEASE_TOKEN }}

      - name: Create Git Tag
        if: steps.sync_code.outputs.skip == 'false'
        run: |
          git tag ${{ steps.sync_code.outputs.tag }}
          git push origin ${{ steps.sync_code.outputs.tag }}
        env:
          GITHUB_TOKEN: ${{ secrets.RELEASE_TOKEN }}

      - name: Create Package
        if: steps.sync_code.outputs.skip == 'false'
        run: |
          STAGING_DIR="joby-sync-staging"
          mkdir -p $STAGING_DIR/joby-sync
          cp -r includes $STAGING_DIR/joby-sync/
          cp -r assets $STAGING_DIR/joby-sync/
          cp joby-sync.php $STAGING_DIR/joby-sync/
          cd $STAGING_DIR
          zip -r ../joby-sync.zip joby-sync/
          cd ..

      - name: Create GitHub Release
        if: steps.sync_code.outputs.skip == 'false'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ steps.sync_code.outputs.tag }}"
          gh release create "$TAG" \
            joby-sync.zip \
            --title "Joby $TAG ($(date +'%Y-%m-%d'))" \
            --generate-notes \
            --latest
