changelog:
  exclude:
    labels:
      - ignore-for-release
    authors:
      - octocat
  categories:
    - title: "🚀 Features"
      labels:
        - enhancement
        - feat
    - title: "🐛 Bug Fixes"
      labels:
        - bug
        - fix
    - title: "🏠 Maintenance"
      labels:
        - chore
        - build
        - documentation
    - title: "⚠️ Security"
      labels:
        - security
