name: Sync Labels

on:
  push:
    branches:
      - main
    paths:
      - '.github/labels.yml'
  workflow_dispatch:

permissions:
  contents: read
  issues: write
  pull-requests: write

jobs:
  labels:
    name: Sync Labels
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Sync Labels
        uses: Mic92/labeler@v1.35.0
        with:
          filename: .github/labels.yml
          token: ${{ secrets.GITHUB_TOKEN }}
---
- name: "bug"
  color: "d73a4a"
  description: "Something isn't working"
- name: "feature"
  color: "a2eeef"
  description: "New feature or request"
- name: "enhancement"
  color: "a2eeef"
  description: "New feature or request"
- name: "fix"
  color: "d73a4a"
  description: "A bug fix"
- name: "improvement"
  color: "0075ca"
  description: "General improvement"
- name: "documentation"
  color: "0075ca"
  description: "Improvements or additions to documentation"
- name: "maintenance"
  color: "d4c5f9"
  description: "Maintenance tasks"
- name: "dependencies"
  color: "0366d6"
  description: "Pull requests that update a dependency file"
- name: "security"
  color: "e99695"
  description: "Security related fixes"
- name: "ui"
  color: "c5def5"
  description: "UI related changes"
